apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-nvr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-nvr-frontend
  template:
    metadata:
      labels:
        app: ai-nvr-frontend
    spec:
      containers:
      - name: frontend
        image: ai-nvr-frontend:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: ai-nvr-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-nvr-api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-nvr-api
  template:
    metadata:
      labels:
        app: ai-nvr-api
    spec:
      containers:
      - name: api
        image: ai-nvr-backend:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: url
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: ai-nvr-api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-nvr-cv-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cv-engine
  template:
    metadata:
      labels:
        app: cv-engine
    spec:
      containers:
      - name: cv-engine
        image: ai-nvr-cv:latest
        resources:
          limits:
            nvidia.com/gpu: 1
        env:
        - name: EVENT_SERVICE_URL
          value: "http://api-service:8000/events"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-nvr-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: nvr.corp.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
